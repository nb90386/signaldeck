<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalDeck — Real-Time Metrics Dashboard</title>
<link rel="icon" href="data:image-svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
:root{--bg:#060d18;--surface:#0c1629;--card:#101e38;--border:rgba(16,185,129,0.15);--emerald:#10b981;--emerald-glow:#34d399;--blue:/*#3b82f6*/;--cyan:#06b6d4;--amber:#fbbf24;--red:#f87171;--violet:#8b5cf6;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--emerald-glow);text-decoration:none}
.header{position:sticky;top:0;z-index:100;background:rgba(6,13,24,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.15rem}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--emerald),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center}
.nav-link{color:var(--text-dim);font-size:0.85rem;background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 12px;border-radius:8px}
.nav-link:hover,.nav-link.active{background:rgba(16,185,129,0.1);color:var(--emerald-glow)}
.btn{padding:8px 18px;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,var(--emerald),var(--cyan));color:#000}
.btn-primary:hover{transform:translateY(-1px)}
.section{padding:28px 32px;max-width:1400px;margin:0 auto}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--emerald),var(--cyan))}
.kpi-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.kpi-value{font-size:1.8rem;font-weight:800;color:var(--text)}
.kpi-change{font-size:0.75rem;margin-top:4px}
.kpi-change.up{color:var(--emerald-glow)}
.kpi-change.down{color:var(--red)}
/* Charts */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-title{font-size:0.85rem;font-weight:600;margin-bottom:12px;color:var(--text-dim)}
.chart-area{width:100%;height:200px;position:relative}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:180px;padding-top:20px}
.bar{flex:1;background:linear-gradient(to top,var(--emerald),var(--cyan));border-radius:3px 3px 0 0;min-height:4px;transition:height 0.5s;position:relative;cursor:pointer}
.bar:hover{opacity:0.8}
.bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:var(--text-muted);white-space:nowrap}
/* Funnel */
.funnel-steps{display:flex;flex-direction:column;gap:8px;padding:10px 0}
.funnel-step{display:flex;align-items:center;gap:12px}
.funnel-bar-wrap{flex:1;height:32px;background:rgba(16,185,129,0.06);border-radius:6px;overflow:hidden;position:relative}
.funnel-bar{height:100%;background:linear-gradient(90deg,var(--emerald),rgba(16,185,129,0.4));border-radius:6px;display:flex;align-items:center;padding-left:12px;font-size:0.8rem;font-weight:600;transition:width 0.8s}
.funnel-label{width:100px;font-size:0.8rem;color:var(--text-dim);text-align:right}
.funnel-rate{font-size:0.75rem;color:var(--emerald-glow);width:50px}
/* Activity Feed */
.activity-feed{max-height:300px;overflow-y:auto}
.activity-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(16,185,129,0.06);font-size:0.8rem}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.activity-dot.page_view{background:var(--cyan)}.activity-dot.signup{background:var(--emerald)}.activity-dot.purchase{background:var(--amber)}
.activity-dot.feature_use{background:var(--violet)}.activity-dot.api_call{background:var(--blue)}
.activity-time{color:var(--text-muted);font-size:0.7rem;margin-left:auto;white-space:nowrap}
/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:8px 12px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.data-table td{padding:10px 12px;border-bottom:1px solid rgba(16,185,129,0.06);font-size:0.85rem}
.data-table tr:hover td{background:rgba(16,185,129,0.04)}
/* Alerts */
.alert-item{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:0.85rem}
.alert-item.critical{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2)}
/* Pie */
.pie-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.pie-item{text-align:center;padding:12px;background:var(--surface);border-radius:10px}
.pie-value{font-size:1.2rem;font-weight:700;color:var(--emerald-glow)}
.pie-label{font-size:0.7rem;color:var(--text-muted);margin-top:4px}
/* Live dot */
.live-dot{display:inline-block;width:8px;height:8px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.footer{padding:30px 32px;text-align:center;border-top:1px solid var(--border);color:var(--text-muted);font-size:0.8rem}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><div class="logo-icon">📊</div>SignalDeck</div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="live-dot"></span>
    <span style="font-size:0.75rem;color:var(--emerald-glow)">Live</span>
    <button class="nav-link active" onclick="refreshData()" style="margin-left:12px">↻ Refresh</button>
  </div>
</header>

<div class="section">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📈 Events Over Time (30 days)</div>
      <div class="bar-chart" id="timeSeriesChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🔄 Conversion Funnel</div>
      <div class="funnel-steps" id="funnelChart"></div>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📊 Events by Type</div>
      <div class="pie-grid" id="typeBreakdown"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">⚡ Real-Time Activity</div>
      <div class="activity-feed" id="activityFeed"></div>
    </div>
  </div>
  <div class="charts-grid" style="grid-template-columns:1fr 1fr">
    <div class="chart-card">
      <div class="chart-title">📄 Top Pages</div>
      <table class="data-table"><thead><tr><th>Page</th><th>Views</th><th>Share</th></tr></thead><tbody id="topPages"></tbody></table>
    </div>
    <div class="chart-card">
      <div class="chart-title">🔔 Alerts</div>
      <div id="alertsArea"></div>
    </div>
  </div>
</div>
<footer class="footer">SignalDeck — Real-Time Metrics Dashboard • FastAPI + SQLite + Vanilla JS</footer>

<script>
const API=window.location.origin+'/api';
const COLORS={page_view:'#06b6d4',signup:'#10b981',purchase:'#fbbf24',feature_use:'#8b5cf6',api_call:'#3b82f6',support_ticket:'#f87171',review:'#a78bfa'};

async function fetchJSON(u){return(await fetch(u)).json()}

async function refreshData(){
  const [summary,ts,funnel,byType,rt,alerts]=await Promise.all([
    fetchJSON(API+'/dashboard/summary'),
    fetchJSON(API+'/dashboard/timeseries?event_type=page_view&days=30'),
    fetchJSON(API+'/dashboard/funnel'),
    fetchJSON(API+'/dashboard/events-by-type'),
    fetchJSON(API+'/dashboard/realtime'),
    fetchJSON(API+'/alerts'),
  ]);
  renderKPIs(summary);
  renderTimeSeries(ts);
  renderFunnel(funnel);
  renderTypeBreakdown(byType);
  renderActivity(rt);
  renderTopPages(summary.top_pages, summary.page_views);
  renderAlerts(alerts);
}

function renderKPIs(s){
  const kpis=[
    {label:'Total Events',value:s.total_events,change:'+12% this week',up:true},
    {label:'Unique Users',value:s.unique_users,change:'+8% this week',up:true},
    {label:'Signups',value:s.signups,change:'+15% this week',up:true},
    {label:'Revenue',value:'$'+s.total_revenue.toLocaleString(),change:'+23% this week',up:true},
    {label:'Conversion Rate',value:s.conversion_rate+'%',change:'+0.3% this week',up:true},
    {label:'Avg Session',value:s.avg_session_min+' min',change:'-2% this week',up:false},
  ];
  document.getElementById('kpiGrid').innerHTML=kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-change ${k.up?'up':'down'}">${k.change}</div>
    </div>
  `).join('');
}

function renderTimeSeries(data){
  if(!data.length)return;
  const max=Math.max(...data.map(d=>d.count),1);
  document.getElementById('timeSeriesChart').innerHTML=data.map(d=>{
    const h=(d.count/max*160);
    const label=d.date.slice(5);
    return `<div class="bar" style="height:${h}px" title="${d.date}: ${d.count}"><span class="bar-label">${label}</span></div>`;
  }).join('');
}

function renderFunnel(steps){
  if(!steps.length)return;
  document.getElementById('funnelChart').innerHTML=steps.map(s=>`
    <div class="funnel-step">
      <div class="funnel-label">${s.step.replace('_',' ')}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${s.rate}%">${s.count.toLocaleString()}</div></div>
      <div class="funnel-rate">${s.rate}%</div>
    </div>
  `).join('');
}

function renderTypeBreakdown(data){
  const total=Object.values(data).reduce((a,b)=>a+b,0)||1;
  document.getElementById('typeBreakdown').innerHTML=Object.entries(data).map(([t,c])=>`
    <div class="pie-item">
      <div class="pie-value" style="color:${COLORS[t]||'var(--cyan)'}">${c}</div>
      <div class="pie-label">${t.replace('_',' ')} (${Math.round(c/total*100)}%)</div>
    </div>
  `).join('');
}

function renderActivity(events){
  document.getElementById('activityFeed').innerHTML=events.slice(0,15).map(e=>`
    <div class="activity-item">
      <div class="activity-dot ${e.type}"></div>
      <span>${e.user}</span>
      <span style="color:var(--text-muted)">${e.type.replace('_',' ')}</span>
      <span class="activity-time">${new Date(e.time).toLocaleTimeString()}</span>
    </div>
  `).join('')||'<div style="color:var(--text-muted);padding:20px">No recent activity</div>';
}

function renderTopPages(pages,total){
  document.getElementById('topPages').innerHTML=pages.map(p=>`<tr>
    <td>${p.page}</td>
    <td>${p.views.toLocaleString()}</td>
    <td>${Math.round(p.views/total*100)}%</td>
  </tr>`).join('')||'<tr><td colspan="3" style="color:var(--text-muted)">No data</td></tr>';
}

function renderAlerts(data){
  const el=document.getElementById('alertsArea');
  if(data.alerts.length){
    el.innerHTML=data.alerts.map(a=>`<div class="alert-item ${a.value<a.threshold?'critical':''}">⚠️ ${a.rule}: ${a.value} (threshold: ${a.threshold})</div>`).join('');
  } else {
    el.innerHTML='<div style="color:var(--emerald-glow);font-size:0.85rem">✅ All metrics within normal range</div>';
  }
  if(data.rules.length){
    el.innerHTML+='<div style="margin-top:12px;font-size:0.75rem;color:var(--text-muted)">'+data.rules.length+' alert rules active</div>';
  }
}

// Auto-refresh
refreshData();
setInterval(refreshData,10000);
</script>
</body>
</html>
